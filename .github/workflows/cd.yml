name: CD

on:
  repository_dispatch:
    types: [plugin-sync]
  workflow_dispatch:
    inputs:
      repo:
        description: "Source repo name (e.g., wet-mcp)"
        required: true
        type: choice
        options:
          - wet-mcp
          - mnemo-mcp
          - better-telegram-mcp
          - better-code-review-graph
          - better-notion-mcp
          - better-email-mcp
          - better-godot-mcp
      tag:
        description: "Release tag (e.g., v2.18.1)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: plugin-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync Plugin
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_KEY }}

      - name: Resolve inputs
        id: inputs
        env:
          REPO: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.repo || inputs.repo }}
          TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag || inputs.tag }}
        run: |
          set -euo pipefail
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          printf "repo<<%s\n" "$EOF" >> "$GITHUB_OUTPUT"
          printf "%s\n" "$REPO" >> "$GITHUB_OUTPUT"
          printf "%s\n" "$EOF" >> "$GITHUB_OUTPUT"
          printf "tag<<%s\n" "$EOF" >> "$GITHUB_OUTPUT"
          printf "%s\n" "$TAG" >> "$GITHUB_OUTPUT"
          printf "%s\n" "$EOF" >> "$GITHUB_OUTPUT"

      - name: Validate inputs
        env:
          REPO: ${{ steps.inputs.outputs.repo }}
          TAG: ${{ steps.inputs.outputs.tag }}
        run: |
          set -euo pipefail
          case "$REPO" in
            wet-mcp|mnemo-mcp|better-telegram-mcp|better-code-review-graph|better-notion-mcp|better-email-mcp|better-godot-mcp)
              ;;
            *)
              printf "::error::Invalid repo: %s\n" "$REPO"
              exit 1
              ;;
          esac
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf "::error::Invalid tag format: %s (expected vX.Y.Z)\n" "$TAG"
            exit 1
          fi
          printf "Syncing %s @ %s\n" "$REPO" "$TAG"

      - name: Checkout marketplace
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: marketplace

      - name: Checkout source repo at tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: n24q02m/${{ steps.inputs.outputs.repo }}
          ref: ${{ steps.inputs.outputs.tag }}
          path: source
          token: ${{ steps.app-token.outputs.token }}

      - name: Sync plugin files
        env:
          REPO: ${{ steps.inputs.outputs.repo }}
          TAG: ${{ steps.inputs.outputs.tag }}
        run: |
          set -euo pipefail
          PLUGIN_DIR="marketplace/plugins/$REPO"
          VERSION="${TAG#v}"

          # Sync plugin.json
          if [ -f "source/.claude-plugin/plugin.json" ]; then
            mkdir -p "$PLUGIN_DIR/.claude-plugin"
            cp "source/.claude-plugin/plugin.json" "$PLUGIN_DIR/.claude-plugin/plugin.json"
            printf "Synced plugin.json\n"
          fi

          # Sync gemini-extension.json (update version)
          if [ -f "source/gemini-extension.json" ]; then
            mkdir -p "$PLUGIN_DIR"
            jq --arg v "$VERSION" '.version = $v' source/gemini-extension.json > "$PLUGIN_DIR/gemini-extension.json"
            printf "Synced gemini-extension.json (version: %s)\n" "$VERSION"
          fi

          # Sync skills
          if [ -d "source/skills" ] && (shopt -s nullglob; set -- source/skills/*/SKILL.md; [ $# -gt 0 ]); then
            rm -rf "$PLUGIN_DIR/skills"
            cp -r "source/skills" "$PLUGIN_DIR/skills"
            printf "Synced skills/\n"
          fi

          # Sync hooks
          if [ -d "source/hooks" ] && (shopt -s nullglob; set -- source/hooks/*; [ $# -gt 0 ]); then
            rm -rf "$PLUGIN_DIR/hooks"
            cp -r "source/hooks" "$PLUGIN_DIR/hooks"
            printf "Synced hooks/\n"
          fi

      - name: Commit and push
        env:
          REPO: ${{ steps.inputs.outputs.repo }}
          TAG: ${{ steps.inputs.outputs.tag }}
        working-directory: marketplace
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          git config user.name "n24q02m-ci[bot]"
          git config user.email "n24q02m-ci[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            printf "No changes to sync\n"
          else
            COMMIT_MSG="chore(plugins): sync $REPO to $VERSION"
            git commit -m "$COMMIT_MSG"
            git push
            printf "Pushed sync for %s %s\n" "$REPO" "$VERSION"
          fi
