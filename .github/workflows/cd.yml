name: CD

on:
  repository_dispatch:
    types: [plugin-sync]
  workflow_dispatch:
    inputs:
      repo:
        description: "Source repo name (e.g., wet-mcp)"
        required: true
        type: choice
        options:
          - wet-mcp
          - mnemo-mcp
          - better-telegram-mcp
          - better-code-review-graph
          - better-notion-mcp
          - better-email-mcp
          - better-godot-mcp
          - imagine-mcp
          - agent-chat-plugin
      tag:
        description: "Release tag (e.g., v2.18.1)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: plugin-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync Plugin
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_KEY }}

      - name: Resolve inputs
        id: inputs
        env:
          REPO: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.repo || inputs.repo }}
          TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag || inputs.tag }}
        run: |
          set -euo pipefail
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          printf "repo<<%s\n" "$EOF" >> "$GITHUB_OUTPUT"
          printf "%s\n" "$REPO" >> "$GITHUB_OUTPUT"
          printf "%s\n" "$EOF" >> "$GITHUB_OUTPUT"
          printf "tag<<%s\n" "$EOF" >> "$GITHUB_OUTPUT"
          printf "%s\n" "$TAG" >> "$GITHUB_OUTPUT"
          printf "%s\n" "$EOF" >> "$GITHUB_OUTPUT"

      - name: Validate inputs
        env:
          REPO: ${{ steps.inputs.outputs.repo }}
          TAG: ${{ steps.inputs.outputs.tag }}
        run: |
          set -euo pipefail

          sanitize() {
            local val="$1"
            val="${val//%/%25}"
            val="${val//$'\r'/%0D}"
            val="${val//$'\n'/%0A}"
            printf "%s" "$val"
          }

          case "$REPO" in
            wet-mcp|mnemo-mcp|better-telegram-mcp|better-code-review-graph|better-notion-mcp|better-email-mcp|better-godot-mcp|imagine-mcp|agent-chat-plugin)
              ;;
            *)
              printf "::error::Invalid repo: %s\n" "$(sanitize "$REPO")"
              exit 1
              ;;
          esac
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf "::error::Invalid tag format: %s (expected vX.Y.Z)\n" "$(sanitize "$TAG")"
            exit 1
          fi
          printf "Syncing %s @ %s\n" "$(sanitize "$REPO")" "$(sanitize "$TAG")"

      - name: Checkout marketplace
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: marketplace

      - name: Checkout source repo at tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: n24q02m/${{ steps.inputs.outputs.repo }}
          ref: ${{ steps.inputs.outputs.tag }}
          path: source
          token: ${{ steps.app-token.outputs.token }}

      - name: Sync plugin files
        env:
          REPO: ${{ steps.inputs.outputs.repo }}
          TAG: ${{ steps.inputs.outputs.tag }}
        run: |
          set -euo pipefail
          PLUGIN_DIR="marketplace/plugins/$REPO"
          VERSION="${TAG#v}"

          # Sync plugin.json
          if [ -f "source/.claude-plugin/plugin.json" ]; then
            mkdir -p "$PLUGIN_DIR/.claude-plugin"
            cp "source/.claude-plugin/plugin.json" "$PLUGIN_DIR/.claude-plugin/plugin.json"
            printf "Synced plugin.json\n"
          fi

          # Sync gemini-extension.json (update version)
          if [ -f "source/gemini-extension.json" ]; then
            mkdir -p "$PLUGIN_DIR"
            jq --arg v "$VERSION" '.version = $v' source/gemini-extension.json > "$PLUGIN_DIR/gemini-extension.json"
            printf "Synced gemini-extension.json (version: %s)\n" "$VERSION"
          fi

          # Sync skills
          if [ -d "source/skills" ] && (shopt -s nullglob; set -- source/skills/*/SKILL.md; [ $# -gt 0 ]); then
            rm -rf "$PLUGIN_DIR/skills"
            cp -r "source/skills" "$PLUGIN_DIR/skills"
            printf "Synced skills/\n"
          fi

          # Sync hooks
          if [ -d "source/hooks" ] && (shopt -s nullglob; set -- source/hooks/*; [ $# -gt 0 ]); then
            rm -rf "$PLUGIN_DIR/hooks"
            cp -r "source/hooks" "$PLUGIN_DIR/hooks"
            printf "Synced hooks/\n"
          fi

          # Sync commands (non-MCP plugins, e.g. agent-chat-plugin; no-op otherwise)
          if [ -d "source/commands" ] && (shopt -s nullglob; set -- source/commands/*; [ $# -gt 0 ]); then
            rm -rf "$PLUGIN_DIR/commands"
            cp -r "source/commands" "$PLUGIN_DIR/commands"
            printf "Synced commands/\n"
          fi

          # Sync top-level runtime entrypoint (non-MCP plugins, e.g. agent-chat-plugin; no-op otherwise)
          if [ -f "source/chat.py" ]; then
            cp "source/chat.py" "$PLUGIN_DIR/chat.py"
            printf "Synced chat.py\n"
          fi

      - name: Commit and push
        env:
          REPO: ${{ steps.inputs.outputs.repo }}
          TAG: ${{ steps.inputs.outputs.tag }}
        working-directory: marketplace
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          git config user.name "n24q02m-ci[bot]"
          git config user.email "n24q02m-ci[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            printf "No changes to sync\n"
            exit 0
          fi
          COMMIT_MSG="chore(plugins): sync $REPO to $VERSION"
          git commit -m "$COMMIT_MSG"
          # Retry push on race with concurrent plugin-sync runs.
          # Concurrency group serializes most cases, but rapid
          # repository_dispatch bursts can still produce push-time
          # races (rejected: fetch first). Rebase + retry handles them.
          attempt=0
          max_attempts=5
          until git push; do
            attempt=$((attempt + 1))
            if [ "$attempt" -ge "$max_attempts" ]; then
              printf "::error::Push failed after %d attempts\n" "$attempt"
              exit 1
            fi
            printf "Push rejected (attempt %d/%d), rebasing onto origin/main and retrying\n" \
              "$attempt" "$max_attempts"
            git fetch origin main
            git rebase origin/main
            sleep $((attempt * 2))
          done
          printf "Pushed sync for %s %s (after %d attempt(s))\n" "$REPO" "$VERSION" "$((attempt + 1))"
