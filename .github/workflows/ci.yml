name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  issue_comment:
    types: [created, edited]
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate Marketplace
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate marketplace.json
        run: |
          echo "Validating marketplace.json..."
          python3 -c "
          import json, sys, os

          # Validate marketplace.json
          with open('.claude-plugin/marketplace.json') as f:
              marketplace = json.load(f)

          required = ['name', 'metadata', 'owner', 'plugins']
          for field in required:
              assert field in marketplace, f'Missing field: {field}'

          plugins = marketplace['plugins']
          assert len(plugins) > 0, 'No plugins defined'

          errors = []
          for plugin in plugins:
              name = plugin['name']
              source = plugin['source']
              plugin_dir = source.lstrip('./')

              # Check plugin.json exists and is valid
              pjson = os.path.join(plugin_dir, '.claude-plugin', 'plugin.json')
              if not os.path.exists(pjson):
                  errors.append(f'{name}: missing {pjson}')
                  continue
              with open(pjson) as f:
                  pdata = json.load(f)
              for req in ['name', 'description', 'mcpServers']:
                  if req not in pdata:
                      errors.append(f'{name}: plugin.json missing {req}')

              # Check gemini-extension.json exists and has version
              gext = os.path.join(plugin_dir, 'gemini-extension.json')
              if os.path.exists(gext):
                  with open(gext) as f:
                      gdata = json.load(f)
                  if 'version' not in gdata:
                      errors.append(f'{name}: gemini-extension.json missing version')
              else:
                  errors.append(f'{name}: missing gemini-extension.json')

              # Check skills have frontmatter
              skills_dir = os.path.join(plugin_dir, 'skills')
              if os.path.isdir(skills_dir):
                  for skill_name in os.listdir(skills_dir):
                      skill_file = os.path.join(skills_dir, skill_name, 'SKILL.md')
                      if os.path.exists(skill_file):
                          with open(skill_file) as f:
                              content = f.read()
                          if not content.startswith('---'):
                              errors.append(f'{name}/skills/{skill_name}: SKILL.md missing frontmatter')
                          if len(content.strip()) < 50:
                              errors.append(f'{name}/skills/{skill_name}: SKILL.md too short')

          if errors:
              print('Validation errors:')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)
          else:
              print(f'All {len(plugins)} plugins validated successfully')
          "

      - name: Check version freshness
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Checking marketplace versions against latest releases..."
          python3 -c "
          import json, subprocess, sys

          with open('.claude-plugin/marketplace.json') as f:
              marketplace = json.load(f)

          stale = []
          for plugin in marketplace['plugins']:
              name = plugin['name']
              source = plugin['source'].lstrip('./')
              gext_path = f'{source}/gemini-extension.json'

              # Get marketplace version
              try:
                  with open(gext_path) as f:
                      gdata = json.load(f)
                  marketplace_ver = gdata.get('version', 'unknown')
              except:
                  marketplace_ver = 'missing'

              # Get latest stable release from source repo
              result = subprocess.run(
                  ['gh', 'release', 'view', '--repo', f'n24q02m/{name}', '--json', 'tagName', '-q', '.tagName'],
                  capture_output=True, text=True
              )
              if result.returncode == 0:
                  latest_tag = result.stdout.strip().lstrip('v')
                  if marketplace_ver != latest_tag:
                      stale.append(f'{name}: marketplace={marketplace_ver}, latest={latest_tag}')
                      print(f'::warning ::{name} is stale: marketplace={marketplace_ver}, latest={latest_tag}')
                  else:
                      print(f'{name}: up-to-date ({marketplace_ver})')
              else:
                  print(f'{name}: no release found (marketplace={marketplace_ver})')

          if stale:
              print(f'\n{len(stale)} plugin(s) need sync')
          else:
              print('\nAll plugins up-to-date')
          "

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Dependency Review
        uses: actions/dependency-review-action@3c4e3dcb1aa7874d2c16be7d79418e9b7efd6261 # v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always

  ai_pr_review:
    name: Qodo AI Code Review
    if: >-
      (
        github.event_name == 'issue_comment'
        && github.event.sender.type != 'Bot'
      ) || (
        github.event_name == 'pull_request_target'
        && github.event.sender.type != 'Bot'
        && github.event.pull_request.user.login != 'n24q02m'
      )
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Load custom instructions
        run: |
          if [ -f ".github/best_practices.md" ]; then
            INSTRUCTIONS=$(cat .github/best_practices.md)
            RANDOM_EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "CUSTOM_INSTRUCTIONS<<$RANDOM_EOF" >> "$GITHUB_ENV"
            echo "$INSTRUCTIONS" >> "$GITHUB_ENV"
            echo "$RANDOM_EOF" >> "$GITHUB_ENV"
          fi

      - name: Authenticate to GCP (Vertex AI)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.VERTEX_WIF_PROVIDER }}
          service_account: ${{ vars.VERTEX_SERVICE_ACCOUNT }}

      - name: PR Agent action step
        uses: qodo-ai/pr-agent@d82f7d3e696cd00822694aaa3096265d3889f3f1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERTEXAI_PROJECT: ${{ vars.VERTEX_PROJECT }}
          VERTEXAI_LOCATION: global
          PR_REVIEWER__EXTRA_INSTRUCTIONS: ${{ env.CUSTOM_INSTRUCTIONS }}
          PR_CODE_SUGGESTIONS__EXTRA_INSTRUCTIONS: ${{ env.CUSTOM_INSTRUCTIONS }}
          PR_DESCRIPTION__EXTRA_INSTRUCTIONS: ${{ env.CUSTOM_INSTRUCTIONS }}
          GITHUB_ACTION_CONFIG__AUTO_REVIEW: "true"
          GITHUB_ACTION_CONFIG__AUTO_DESCRIBE: "true"
          GITHUB_ACTION_CONFIG__AUTO_IMPROVE: "true"
          GITHUB_ACTION_CONFIG__HANDLE_PR_ACTIONS: '["opened", "reopened", "ready_for_review", "synchronize"]'

  email-notify:
    name: Email Notification
    if: >-
      (github.event_name == 'issues' || github.event_name == 'pull_request_target')
      && github.actor != 'n24q02m'
      && github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - name: Parse SMTP credential
        run: |
          echo "SMTP_USER=${SMTP_CREDENTIAL%%:*}" >> $GITHUB_ENV
          echo "SMTP_PASS=${SMTP_CREDENTIAL#*:}" >> $GITHUB_ENV
        env:
          SMTP_CREDENTIAL: ${{ secrets.SMTP_CREDENTIAL }}

      - name: Send email notification
        uses: dawidd6/action-send-mail@d38f3f7cd391cdebfe0d38efc3998b935e951c4f # v16
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: >-
            [${{ github.event.repository.name }}]
            ${{ github.event_name == 'issues' && 'Issue' || 'PR' }}
            #${{ github.event.issue.number || github.event.pull_request.number }}:
            ${{ github.event.issue.title || github.event.pull_request.title }}
          to: ${{ env.SMTP_USER }}
          from: GitHub Notify <${{ env.SMTP_USER }}>
          body: |
            ${{ github.event_name == 'issues' && 'New issue' || 'New pull request' }} in ${{ github.repository }}

            Title: ${{ github.event.issue.title || github.event.pull_request.title }}
            Author: ${{ github.actor }}
            URL: ${{ github.event.issue.html_url || github.event.pull_request.html_url }}
            Action: ${{ github.event.action }}

            ---
            ${{ github.event.issue.body || github.event.pull_request.body || 'No description provided.' }}
