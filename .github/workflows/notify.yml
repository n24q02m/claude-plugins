name: Notification

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  issues:
    types: [opened, reopened]

permissions: {}

jobs:
  email-notify:
    permissions:
      contents: read
    name: Email Notification
    if: >-
      github.actor != github.repository_owner
      && github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Parse SMTP credential
        run: |
          set -euo pipefail
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)

          # Mask extracted credentials to prevent plaintext logging
          SMTP_USER_VAL="${SMTP_CREDENTIAL%%:*}"
          SMTP_PASS_VAL="${SMTP_CREDENTIAL#*:}"
          printf "::add-mask::%s\n" "$SMTP_USER_VAL"
          printf "::add-mask::%s\n" "$SMTP_PASS_VAL"

          printf "SMTP_USER<<%s\n" "$EOF" >> "$GITHUB_ENV"
          printf "%s\n" "$SMTP_USER_VAL" >> "$GITHUB_ENV"
          printf "%s\n" "$EOF" >> "$GITHUB_ENV"

          printf "SMTP_PASS<<%s\n" "$EOF" >> "$GITHUB_ENV"
          printf "%s\n" "$SMTP_PASS_VAL" >> "$GITHUB_ENV"
          printf "%s\n" "$EOF" >> "$GITHUB_ENV"
        env:
          SMTP_CREDENTIAL: ${{ secrets.SMTP_CREDENTIAL }}

      - name: Sanitize inputs
        run: |
          python3 -c "
          import os
          import uuid

          title = os.environ.get('RAW_TITLE', '')
          body = os.environ.get('RAW_BODY', '')

          # Sanitize title: single line, no leading/trailing whitespace
          sanitized_title = ' '.join(title.splitlines()).strip()
          delimiter = f'EOF_{uuid.uuid4().hex}'

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'SANITIZED_TITLE={sanitized_title}\n')
              f.write(f'SANITIZED_BODY<<{delimiter}\n')
              f.write(body + '\n')
              f.write(f'{delimiter}\n')
          "
        env:
          RAW_TITLE: ${{ github.event.issue.title || github.event.pull_request.title }}
          RAW_BODY: ${{ github.event.issue.body || github.event.pull_request.body || 'No description provided.' }}

      - name: Send email notification
        uses: dawidd6/action-send-mail@94de994a9f6fffee200243214e17002e2920bb59 # v18
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: >-
            [${{ github.event.repository.name }}]
            ${{ github.event_name == 'issues' && 'Issue' || 'PR' }}
            #${{ github.event.issue.number || github.event.pull_request.number }}:
            ${{ env.SANITIZED_TITLE }}
          to: ${{ env.SMTP_USER }}
          from: GitHub Notify <${{ env.SMTP_USER }}>
          body: |
            ${{ github.event_name == 'issues' && 'New issue' || 'New pull request' }} in ${{ github.repository }}

            Title: ${{ env.SANITIZED_TITLE }}
            Author: ${{ github.actor }}
            URL: ${{ github.event.issue.html_url || github.event.pull_request.html_url }}
            Action: ${{ github.event.action }}

            ---
            ${{ env.SANITIZED_BODY }}
