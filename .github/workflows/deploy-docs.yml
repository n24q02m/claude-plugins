name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'plugins/*/setup.md'
      - 'plugins/*/setup-with-agent.md'
      - 'plugins/*/tools.md'
      - 'plugins/*/modes.md'
      - 'plugins/*/overview.md'
      - 'plugins/*/troubleshooting.md'
      - 'plugins/*/architecture.md'
      - 'plugins/*/trust-model.md'
      - 'plugins/*/migration.md'
      - 'plugins/*/shared-services.md'
      - 'plugins/*/models.md'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Build site
        working-directory: docs
        run: bun run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/dist --project-name=mcp-n24q02m --branch=main
